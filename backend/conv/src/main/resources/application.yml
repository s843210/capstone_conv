spring:
  jackson:
    time-zone: Asia/Seoul
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:campus_store}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        jdbc:
          time_zone: Asia/Seoul
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  auth:
    admin:
      login-id: ${ADMIN_LOGIN_ID:}
      password: ${ADMIN_PASSWORD:}
      name: ${ADMIN_NAME:admin}
      email: ${ADMIN_EMAIL:}
    google:
      client-ids: ${GOOGLE_CLIENT_IDS:}
      allowed-domain: ${GOOGLE_ALLOWED_DOMAIN:}
  jwt:
    secret: ${JWT_SECRET:local-development-jwt-secret-change-this-before-release}
    issuer: ${JWT_ISSUER:campus-store}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  ai:
    base-url: ${AI_BASE_URL:http://127.0.0.1:8000}
  sales:
    monthly-v2-processed-path: ${MONTHLY_V2_PROCESSED_PATH:../../Ai/data/processed/monthly_sales_with_calendar_timetable_weather_v2.csv}
  weather:
    enabled: ${WEATHER_ENABLED:false}
    base-url: ${WEATHER_BASE_URL:https://api.openweathermap.org}
    forecast-path: ${WEATHER_FORECAST_PATH:/data/2.5/forecast}
    api-key: ${WEATHER_API_KEY:}
    latitude: ${WEATHER_LAT:37.2941}
    longitude: ${WEATHER_LON:127.0448}
    timeout-sec: ${WEATHER_TIMEOUT_SEC:10}
    retry-count: ${WEATHER_RETRY:3}
    retry-backoff-millis: ${WEATHER_RETRY_BACKOFF_MS:500}
    schedule-cron: ${WEATHER_SCHEDULE_CRON:0 40 17 * * *}
    schedule-zone: ${WEATHER_SCHEDULE_ZONE:Asia/Seoul}
  holiday:
    enabled: ${HOLIDAY_ENABLED:true}
    include-weekend: ${HOLIDAY_INCLUDE_WEEKEND:true}
    api-enabled: ${HOLIDAY_API_ENABLED:true}
    base-url: ${HOLIDAY_BASE_URL:https://date.nager.at}
    public-holiday-path: ${HOLIDAY_PUBLIC_HOLIDAY_PATH:/api/v3/PublicHolidays/{year}/{countryCode}}
    country-code: ${HOLIDAY_COUNTRY_CODE:KR}
    timeout-sec: ${HOLIDAY_TIMEOUT_SEC:8}
    retry-count: ${HOLIDAY_RETRY:2}
    retry-backoff-millis: ${HOLIDAY_RETRY_BACKOFF_MS:300}

server:
  port: 8080

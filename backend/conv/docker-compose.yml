version: '3.8'

services:
  db:
    image: postgres:15
    container_name: campus-store-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: Asia/Seoul
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: